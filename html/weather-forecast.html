
        <!doctype html>
<html>
  <head>
    <link rel="stylesheet" type="text/css" href="../basicui/mdl/material.min.css" />
    <link rel="stylesheet" type="text/css" href="../basicui/material-icons.css" />
    <link rel="stylesheet" type="text/css" href="../basicui/framework7-icons.css" />
    <link rel="stylesheet" type="text/css" href="../basicui/smarthome.css?v=202501122027" />

    <script src="../basicui/smarthome.js?v=202501122027"></script>
    <script src="../basicui/mdl/material.min.js"></script>
  </head>

  <script>
      function getWeatherForecast() {
        const formatter = new Intl.DateTimeFormat('en-US', {
          weekday: "long",
        });

        // Get common stuff (timestamp, condition icon and tempoerature) for both all segments.
        const segments = ['Quarter1', 'Quarter2', 'Quarter3', 'Quarter4', 'Tomorrow', 'In2Days', 'In3Days', 'In4Days']
        for ( const[i, segment] of segments.entries() ) {
          fetch('/rest/items/FF_Virtual_Weather_Temperature_' + segment + '_Datetime')
            .then(response => response.json())
            .then(data => {
                var datetime = new Date(data.state);

                label = '';
                if (segment.startsWith('Quarter') ) {
                  if (datetime.getHours() == 0) {
                    label = 'Night';
                  } else if (datetime.getHours() == 6) {
                    label = 'Morning';
                  } else if (datetime.getHours() == 12) {
                    label = 'Afternoon';
                  } else {
                    label = 'Evening';
                  }
                } else {
                  label = formatter.format(datetime);
                }

                document.getElementById(segment + "-label").textContent = label;
            })
            .catch(error => console.error('Error:', error));


          fetch('/rest/items/FF_Virtual_Weather_Temperature_' + segment + '_WeatherSymbol')
            .then(response => response.json())
            .then(data => {
                symbol = data.state;

                icon = '';
                if ( symbol == 0 )  {
                  icon = 'sun'
                } else if ( symbol >= 1 || symbol <= 4 ) {
                  icon = 'sun_clouds'
                } else if ( symbol >= 5 || symbol <= 9 ) {
                  icon = 'rain'
                } else if ( symbol >= 10 || symbol <= 14 ) {
                  icon = 'snow'
                } else if ( symbol == 16 ) {
                  icon = 'wind'
                }

                if ( icon == '' ) {
                  document.getElementById(segment + "-icon").innerHTML = '';
                } else {
                  document.getElementById(segment + "-icon").innerHTML = 
                    "<span class='mdl-form__icon'><img src='../icon/" + icon + "?format=svg' /></span>"
                }
            })
            .catch(error => console.error('Error:', error));
        }
        
        // Today's specific temperature
        const quarters = ['Quarter1', 'Quarter2', 'Quarter3', 'Quarter4'];
        for ( const[i, quarter] of quarters.entries() ) {
          fetch('/rest/items/FF_Virtual_Weather_Temperature_' + quarter)
            .then(response => response.json())
            .then(data => {
                numberValue = Number(data.state.substring(0, data.state.length - 2)).toFixed(0);
                document.getElementById(quarter + "-temperature").textContent =
                          "" + numberValue + " " + data.unitSymbol;
            })
            .catch(error => console.error('Error:', error));
        }

        // Next several days' high and low
        const futureSegments = ['Tomorrow', 'In2Days', 'In3Days', 'In4Days'];
        for ( const[i, segment] of futureSegments.entries() ) {
          fetchTemperatureRange(segment);
        }
      }

      /**
       * Fetch the high & low temperatures from two separate items and display it in the corresponding DOM item.
       */
      async function fetchTemperatureRange(segment) {
        const responses = await Promise.all([
          fetch('/rest/items/FF_Virtual_Weather_Temperature_' + segment + "_TempHigh"),
          fetch('/rest/items/FF_Virtual_Weather_Temperature_' + segment + "_TempLow")
          ]);

          const data1 = await responses[0].json();
          const data2 = await responses[1].json();

          tempHigh = Number(data1.state.substring(0, data1.state.length - 2)).toFixed(0);
          tempLow = Number(data2.state.substring(0, data2.state.length - 2)).toFixed(0);
          unit = data1.unitSymbol;

          tempRange = "" + tempHigh + " " + unit + " &#8594; " + tempLow + " " + unit;
          document.getElementById(segment + "-temperature").innerHTML = tempRange;
      }

      // Refresh the state periodically
      setInterval(getWeatherForecast, 5000); // in milliseconds
      // Get state on page load
      window.onload = getWeatherForecast;
  </script>
